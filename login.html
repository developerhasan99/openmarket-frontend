<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Openmarket | A Freelance Services Marketplace</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body
    class="antialiased bg-gray-50 dark:bg-[#161616] text-gray-600 min-h-full flex flex-col application application-ltr overflow-x-hidden ">
    <div class="min-h-screen flex grow bg-slate-50 dark:bg-zinc-700">
        <!-- Start Aside Scene -->
        <div class="hidden w-full place-items-center lg:grid">
            <div
                class="w-full px-2 py-40 sm:py-48 sm:px-12 flex flex-col justify-center relative bg-no-repeat bg-center bg-cover h-full">
                <span class="absolute bg-gradient-to-b from-red-500 to-red-400 opacity-75 inset-0 z-0"></span>
                <img style="max-width: 100; height: 50vh; z-index: 1;" src="/images/auth/login.svg" alt="Login">
                <div class="fixed top-0 ltr:left-0 rtl:right-0 hidden p-6 lg:block lg:px-12">
                    <a href="/" class="flex items-center">
                        <img src="/images/Header/logo-bg-dark.png" alt="Openmarket" style="height: 35px;">
                    </a>
                </div>
                <div
                    class="fixed bottom-0 ltr:left-0 rtl:right-0 hidden p-6 lg:block lg:px-12 text-white font-normal text-[13px]">
                    © Openmarket International Ltd. 2023
                </div>
            </div>
        </div>
        <!-- End Aside Scene -->
        <main class="flex w-full flex-col items-center bg-white dark:bg-zinc-800 lg:max-w-md">
            <div class="flex w-full max-w-sm grow flex-col justify-center p-5">
                <div class="text-center">
                    <div class="mt-4">
                        <h2 class="text-xl font-bold text-zinc-700 dark:text-white">
                            Welcome back
                        </h2>
                        <p class="text-zinc-400 dark:text-gray-300">
                            Please sign in to continue </p>
                        <a href="/"
                            class="block lg:hidden mt-3 text-sm tracking-wider font-semibold text-blue-600 hover:underline">
                            Back to homepage </a>
                    </div>
                </div>
                <div class="mt-8">
                    <div class="w-full relative">
                        <div class="mt-6">
                            <form class="grid grid-cols-12 md:gap-x-6 gap-y-6">
                                <div class="col-span-12">
                                    <div class="relative w-full shadow-sm rounded-md">
                                        <input type="email"
                                            class="focus:ring-red-600 focus:border-red-600 border-gray-300 border text-gray-900 text-sm rounded-md font-medium block w-full ltr:pr-12 rtl:pl-12 p-4 placeholder:font-normal dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-red-500 dark:focus:border-red-500"
                                            placeholder="Enter e-mail address">
                                        <div
                                            class="absolute inset-y-0 ltr:right-0 rtl:left-0 flex items-center ltr:pr-3 rtl:pl-3">
                                            <svg class="w-5 h-5 text-gray-400" stroke="currentColor" fill="currentColor"
                                                stroke-width="0" viewBox="0 0 20 20" height="1em" width="1em"
                                                xmlns="http://www.w3.org/2000/svg">
                                                <path fill-rule="evenodd"
                                                    d="M14.243 5.757a6 6 0 10-.986 9.284 1 1 0 111.087 1.678A8 8 0 1118 10a3 3 0 01-4.8 2.401A4 4 0 1114 10a1 1 0 102 0c0-1.537-.586-3.07-1.757-4.243zM12 10a2 2 0 10-4 0 2 2 0 004 0z"
                                                    clip-rule="evenodd"></path>
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-span-12">
                                    <div class="relative w-full shadow-sm rounded-md">
                                        <input type="password"
                                            class="focus:ring-red-600 focus:border-red-600 border-gray-300 border text-gray-900 text-sm rounded-md font-medium block w-full ltr:pr-12 rtl:pl-12 p-4 placeholder:font-normal  dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-red-500 dark:focus:border-red-500"
                                            placeholder="Enter password">
                                        <div
                                            class="absolute inset-y-0 ltr:right-0 rtl:left-0 flex items-center ltr:pr-3 rtl:pl-3">
                                            <svg class="w-5 h-5 text-gray-400" stroke="currentColor" fill="currentColor"
                                                stroke-width="0" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                                                <path fill-rule="evenodd"
                                                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                                    clip-rule="evenodd"></path>
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-span-12 flex items-center">
                                    <div class="relative flex items-start">
                                        <div class="flex items-center h-5">
                                            <input id="remember_me" type="checkbox"
                                                class="focus:ring-red-600 h-5 w-5 text-red-600 border-2 dark:bg-zinc-700 border-gray-200 dark:border-zinc-700 rounded-sm cursor-pointer">
                                        </div>
                                        <div class="ltr:ml-3 rtl:mr-3 text-[13px]">
                                            <label for="remember_me"
                                                class="font-normal text-zinc-600 dark:text-gray-400 cursor-pointer">Remember
                                                me</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-span-12">
                                    <button type="submit"
                                        class="w-full bg-red-600 enabled:hover:bg-red-700 text-white py-4 px-4 rounded-md text-[13px] font-semibold tracking-wide disabled:bg-zinc-200 disabled:text-zinc-500 dark:disabled:bg-zinc-500 dark:disabled:text-zinc-300 disabled:cursor-not-allowed">
                                        <div>
                                            Log in
                                        </div>
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div class="my-6 relative">
                            <div class="absolute inset-0 flex items-center" aria-hidden="true">
                                <div class="w-full border-t border-gray-300 dark:border-zinc-700"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white dark:bg-zinc-800 text-gray-500 dark:text-gray-400">
                                    Or
                                </span>
                            </div>
                        </div>
                        <div class="mt-6">
                            <ul class="list-disc list-inside text-slate-500 text-[13px] space-y-2 dark:text-gray-300">
                                <li>
                                    <a class="hover:text-slate-600 dark:hover:text-zinc-100 hover:underline" href="#">
                                        Create account </a>
                                </li>
                                <li>
                                    <a class="hover:text-slate-600 dark:hover:text-zinc-100 hover:underline" href="#">
                                        Forgot password
                                    </a>
                                </li>
                                <li>
                                    <a class="hover:text-slate-600 dark:hover:text-zinc-100 hover:underline" href="#">
                                        Resend verification email
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
